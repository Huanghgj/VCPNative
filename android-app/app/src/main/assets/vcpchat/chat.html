<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<style>
/* ── 重置 & 基础 ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}

/* ── 主题变量 ───────────────────────────────────── */
:root{
  --bg:#f2f2f7;
  --surface:#fff;
  --text:#1c1c1e;
  --text-secondary:#8e8e93;
  --user-bubble:#007aff;
  --user-text:#fff;
  --ast-bubble:#e9e9eb;
  --ast-text:#1c1c1e;
  --system-bg:rgba(142,142,147,0.12);
  --system-text:#8e8e93;
  --sep:rgba(60,60,67,0.12);
  --link:#007aff;
  --code-bg:rgba(0,0,0,0.05);
  --pre-bg:#1e1e2e;
  --pre-text:#cdd6f4;
  --pre-header:#313244;
  --scrollbar:rgba(0,0,0,0.15);
  --tool-bg:linear-gradient(135deg,#1a3a5c 0%,#0d2137 100%);
  --tool-accent:#4fc3f7;
  --tool-text:#e0e0e0;
  --thought-bg:rgba(142,142,147,0.08);
  --thought-border:rgba(142,142,147,0.2);
  --diary-bg:#fdfaf6;--diary-text:#5d4037;--diary-border:#eaddd0;
}
@media(prefers-color-scheme:dark){
:root{
  --bg:#000;--surface:#1c1c1e;--text:#e5e5e5;--text-secondary:#8e8e93;
  --user-bubble:#0a84ff;--user-text:#fff;
  --ast-bubble:#2c2c2e;--ast-text:#e5e5e5;
  --system-bg:rgba(142,142,147,0.16);--system-text:#8e8e93;
  --sep:rgba(84,84,88,0.36);--link:#0a84ff;
  --code-bg:rgba(255,255,255,0.08);
  --pre-bg:#1e1e2e;--pre-text:#cdd6f4;--pre-header:#313244;
  --scrollbar:rgba(255,255,255,0.15);
  --tool-bg:linear-gradient(135deg,#0d2137 0%,#1a3a5c 100%);
  --tool-accent:#4fc3f7;--tool-text:#e0e0e0;
  --thought-bg:rgba(142,142,147,0.1);--thought-border:rgba(142,142,147,0.25);
  --diary-bg:#2c2a3a;--diary-text:#d8d2c9;--diary-border:#4a485f;
}}
body{background:var(--bg);color:var(--text)}

/* ── 聊天容器 ───────────────────────────────────── */
#c{
  height:100%;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:8px 14px 16px;
}
#c::-webkit-scrollbar{width:3px}
#c::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}

/* ── 消息 ───────────────────────────────────────── */
.m{display:flex;align-items:flex-end;margin-bottom:4px;max-width:100%;
  content-visibility:auto;contain-intrinsic-size:auto 60px}
.m.user{flex-direction:row-reverse}
.m.assistant,.m.system{flex-direction:row}

/* ── 气泡 ───────────────────────────────────────── */
.b{
  max-width:80%;padding:10px 16px;
  font-size:15px;line-height:1.6;
  word-break:break-word;overflow-wrap:break-word;
}
.m.user .b{
  background:var(--user-bubble);color:var(--user-text);
  border-radius:20px 20px 4px 20px;margin-left:36px;
}
.m.assistant .b{
  background:var(--ast-bubble);color:var(--ast-text);
  border-radius:20px 20px 20px 4px;
  max-width:100%;margin-right:0;
}
.m.system .b{
  background:var(--system-bg);color:var(--system-text);
  border-radius:12px;margin:4px auto;max-width:90%;
  text-align:center;font-size:13px;padding:6px 14px;
}
/* 连续同角色消息 */
.m.user+.m.user{margin-bottom:2px}
.m.user+.m.user .b{border-radius:20px 6px 4px 20px}
.m.assistant+.m.assistant{margin-bottom:2px}
.m.assistant+.m.assistant .b{border-radius:6px 20px 20px 4px;max-width:100%}

/* ── 流式光标 ──────────────────────────────────── */
.streaming .b::after{
  content:'';display:inline-block;width:2px;height:1.1em;
  margin-left:2px;background:currentColor;opacity:0.5;
  animation:blink 1s step-end infinite;vertical-align:text-bottom;
}
@keyframes blink{50%{opacity:0}}

/* ── 思考中 ───────────────────────────────────── */
.dots{display:flex;gap:5px;padding:4px 0}
.dots span{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;opacity:0.35;
  animation:pulse 1.4s infinite ease-in-out;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.35;transform:scale(1)}40%{opacity:1;transform:scale(1.2)}}

/* ── 排版 ──────────────────────────────────────── */
.b p{margin:.4em 0}.b p:first-child{margin-top:0}.b p:last-child{margin-bottom:0}
.b ul,.b ol{margin:.4em 0;padding-left:1.4em}
.b li{margin:.15em 0}
.b blockquote{
  border-left:3px solid var(--text-secondary);
  margin:.5em 0;padding:2px 10px;opacity:.85;
}
.b a{color:var(--link);text-decoration:underline}
.m.user .b a{color:rgba(255,255,255,.9)}
.b code{
  font-family:"SF Mono",Menlo,Consolas,monospace;
  font-size:.87em;padding:1px 5px;
  background:var(--code-bg);border-radius:4px;
}
.m.user .b code{background:rgba(255,255,255,.18)}

/* 代码块 + 语言标签 */
.code-block{position:relative;margin:.6em 0;border-radius:10px;overflow:hidden}
.code-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px;background:var(--pre-header);
  font-size:12px;color:var(--pre-text);opacity:.7;
}
.code-header .copy-btn{
  background:none;border:1px solid rgba(255,255,255,.2);
  color:var(--pre-text);border-radius:4px;padding:2px 8px;
  font-size:11px;cursor:pointer;opacity:.7;
}
.code-header .copy-btn:active{opacity:1}
.code-block pre{
  background:var(--pre-bg);color:var(--pre-text);
  padding:12px 14px;margin:0;overflow-x:auto;
  font-size:13px;line-height:1.5;border-radius:0;
  -webkit-overflow-scrolling:touch;
}
.code-block pre code{background:none;padding:0;font-size:inherit;color:inherit}

/* 表格 */
.b table{border-collapse:collapse;margin:.5em 0;font-size:13px;width:100%;display:block;overflow-x:auto}
.b th,.b td{border:1px solid var(--sep);padding:5px 8px;text-align:left}
.b th{font-weight:600;background:var(--code-bg)}

/* 图片 */
.b img{max-width:100%;height:auto;border-radius:8px;margin:4px 0;display:block}

/* HR */
.b hr{border:none;border-top:1px solid var(--sep);margin:.8em 0}

/* ── 工具调用气泡 ──────────────────────────────── */
.tool-use{
  background:var(--tool-bg);color:var(--tool-text);
  border-radius:10px;padding:10px 14px 10px 38px;
  margin:.5em 0;position:relative;
  font-family:Menlo,Consolas,monospace;font-size:13px;
  border:1px solid rgba(79,195,247,.2);
}
.tool-use::before{
  content:"⚙️";position:absolute;top:10px;left:10px;
  font-size:16px;
}
/* 只在视口内才播放动画（省电） */
@media(prefers-reduced-motion:no-preference){
  .tool-use::before{animation:spin 4s linear infinite}
}
@keyframes spin{to{transform:rotate(360deg)}}
.tool-use .tool-label{color:var(--tool-accent);font-weight:700;font-size:12px}
.tool-use .tool-name{
  background:linear-gradient(90deg,#f1c40f,#fff,#4fc3f7,#f1c40f);
  background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:700;
}
@media(prefers-reduced-motion:no-preference){
  .tool-name{animation:flow 4s linear infinite}
}
@keyframes flow{to{background-position:-300% 0}}
.tool-use .tool-body{
  margin-top:6px;padding-top:6px;
  border-top:1px dashed rgba(255,255,255,.15);
  white-space:pre-wrap;opacity:.8;font-size:12px;
  max-height:120px;overflow:hidden;
  transition:max-height .3s;
}
.tool-use.expanded .tool-body{max-height:2000px}

/* ── 工具结果气泡 ──────────────────────────────── */
.tool-result{
  background:var(--surface);border:1px solid var(--sep);
  border-radius:10px;padding:10px 14px;margin:.5em 0;
  font-size:13px;
}
.tool-result-header{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding-bottom:6px;
}
.tool-result-label{color:#34c759;font-weight:700;font-size:12px}
.tool-result-name{
  background:rgba(52,199,89,.15);color:#34c759;
  padding:1px 8px;border-radius:4px;font-size:12px;font-weight:600;
}
.tool-result-status{font-size:11px;color:var(--text-secondary);margin-left:auto}
.tool-result-toggle{
  width:16px;height:16px;position:relative;cursor:pointer;flex-shrink:0;
}
.tool-result-toggle::before,.tool-result-toggle::after{
  content:'';position:absolute;background:var(--text-secondary);
  top:50%;left:50%;transform:translate(-50%,-50%);border-radius:1px;
}
.tool-result-toggle::before{width:10px;height:2px}
.tool-result-toggle::after{width:2px;height:10px;transition:transform .2s}
.tool-result.expanded .tool-result-toggle::after{transform:translate(-50%,-50%) rotate(90deg)}
.tool-result-body{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .3s,opacity .2s;
}
.tool-result.expanded .tool-result-body{
  max-height:2000px;opacity:1;
  margin-top:6px;padding-top:8px;
  border-top:1px dashed var(--sep);
}
.tool-result-item{margin-bottom:4px}
.tool-result-key{color:var(--tool-accent);font-weight:600;font-size:12px}
.tool-result-val{margin-top:2px;color:var(--text)}
.tool-result-val img{max-height:200px}

/* ── 思维链 ────────────────────────────────────── */
.thought{
  background:var(--thought-bg);border:1px solid var(--thought-border);
  border-radius:12px;padding:10px 14px;margin:.5em 0;
  max-width:98%;
}
.thought-header{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:13px;color:var(--text-secondary);
}
.thought-header .icon{font-size:16px;filter:grayscale(0.3)}
.thought-header .label{font-weight:600}
.thought-body{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;
  font-style:italic;font-size:14px;
}
.thought.expanded .thought-body{
  max-height:3000px;opacity:1;
  margin-top:8px;padding-top:8px;
  border-top:1px dashed var(--thought-border);
}
.thought-body pre{font-style:normal;background:var(--code-bg);padding:8px;border-radius:6px}

/* ── 日记 ──────────────────────────────────────── */
.diary{
  background:var(--diary-bg);color:var(--diary-text);
  border:1px solid var(--diary-border);
  border-radius:10px;padding:12px 16px 14px 44px;
  margin:.5em 0;position:relative;
  font-family:Georgia,"Times New Roman",serif;line-height:1.7;
}
.diary::before{content:"✒️";position:absolute;top:12px;left:14px;font-size:18px;opacity:.6;transform:rotate(-15deg)}
.diary-header{
  display:flex;justify-content:space-between;
  border-bottom:1px solid var(--diary-border);
  padding-bottom:6px;margin-bottom:8px;
}
.diary-title{font-weight:700;font-size:1.05em}
.diary-date{font-size:.85em;opacity:.7;font-style:italic}
.diary-maid{font-size:.9em;margin-bottom:6px;opacity:.8}

/* ── 角色分界 ──────────────────────────────────── */
.role-div{
  display:flex;align-items:center;justify-content:center;
  margin:12px 0;font-size:12px;opacity:.6;user-select:none;
}
.role-div::before,.role-div::after{
  content:'';flex:1;border-bottom:1px dashed var(--sep);margin:0 12px;
}
.role-div.system{color:#e67e22}.role-div.assistant{color:#3498db}.role-div.user{color:#2ecc71}
.role-div.end{opacity:.35}

/* ── 按钮点击 ──────────────────────────────────── */
.btn-click{
  display:inline-block;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:#fff;padding:4px 12px;border-radius:14px;
  font-size:13px;font-weight:500;margin:2px 0;
}

/* ── 长按菜单 ──────────────────────────────────── */
#ctxMenu{
  position:fixed;z-index:9998;
  background:var(--surface);
  border-radius:14px;padding:6px 0;
  min-width:180px;
  box-shadow:0 8px 30px rgba(0,0,0,.18),0 0 0 .5px rgba(0,0,0,.08);
  display:none;overflow:hidden;
  animation:menuIn .15s ease-out;
}
#ctxMenu.active{display:block}
@keyframes menuIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{
  padding:11px 16px;font-size:14px;
  display:flex;align-items:center;gap:10px;
  color:var(--text);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.ctx-item:active{background:var(--code-bg)}
.ctx-item.danger{color:#ff3b30}
.ctx-sep{height:.5px;background:var(--sep);margin:4px 12px}
.ctx-icon{width:18px;text-align:center;font-size:15px;opacity:.7}

/* ── 遮罩 ──────────────────────────────────────── */
#ctxOverlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:9997;display:none;
}
#ctxOverlay.active{display:block}

/* ── HTML 渲染块 ───────────────────────────────── */
.html-render{border-radius:10px;overflow:hidden;margin:4px -4px}
.html-render *{max-width:100%}

/* ── HTML 预览（iframe）────────────────────────── */
.html-preview{position:relative;margin:.5em 0;border-radius:10px;overflow:hidden;border:1px solid var(--sep)}
.html-preview-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;background:var(--pre-header);font-size:12px;color:var(--pre-text);
}
.html-preview-bar button{
  background:var(--user-bubble);color:#fff;border:none;
  padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;
}
.html-preview iframe{
  width:100%;border:none;background:#fff;
  min-height:300px;max-height:70vh;display:none;
}
.html-preview.active iframe{display:block}
.html-preview.active .code-block{display:none}

/* ── 图片查看器覆盖层 ─────────────────────────── */
#imgViewer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.92);z-index:9999;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
}
#imgViewer.active{display:flex}
#imgViewer img{
  max-width:95%;max-height:80vh;
  object-fit:contain;border-radius:4px;
  user-select:none;-webkit-user-select:none;
}
#imgViewer .toolbar{
  position:absolute;bottom:env(safe-area-inset-bottom,20px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
  display:flex;gap:16px;
}
#imgViewer .toolbar button{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:10px 24px;border-radius:22px;
  font-size:14px;font-weight:500;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  cursor:pointer;
}
#imgViewer .toolbar button:active{background:rgba(255,255,255,.3)}
#imgViewer .close-btn{
  position:absolute;top:env(safe-area-inset-top,12px);
  top:calc(env(safe-area-inset-top,0px) + 12px);
  right:16px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>
<div id="c"></div>

<!-- 长按上下文菜单 -->
<div id="ctxOverlay"></div>
<div id="ctxMenu"></div>

<!-- 图片查看器 -->
<div id="imgViewer">
  <button class="close-btn" onclick="closeImgViewer()">✕</button>
  <img id="imgViewerImg" src="" alt=""/>
  <div class="toolbar">
    <button onclick="saveImage()">保存图片</button>
    <button onclick="copyImageUrl()">复制链接</button>
  </div>
</div>

<script>
(function(){
'use strict';
var C=document.getElementById('c'),
    MM={},autoScroll=true,scrollT=null;

// ── 特殊标记正则 ────────────────────────────────
var RE={
  tool:/<<<\[TOOL_REQUEST\]>>>([\s\S]*?)<<<\[END_TOOL_REQUEST\]>>>/g,
  toolResult:/\[\[VCP调用结果信息汇总:([\s\S]*?)VCP调用结果结束\]\]/g,
  thought:/\[---\s*VCP元思考链(?::\s*"([^"]*)")?\s*---\]([\s\S]*?)\[---\s*元思考链结束\s*---\]/g,
  think:/<think(?:ing)?>([\s\S]*?)<\/think(?:ing)?>/gi,
  note:/<<<DailyNoteStart>>>([\s\S]*?)<<<DailyNoteEnd>>>/g,
  roleDiv:/<<<\[(END_)?ROLE_DIVIDE_(SYSTEM|ASSISTANT|USER)\]>>>/g,
  btnClick:/\[\[点击按钮:(.*?)\]\]/g,
  canvas:/\{\{VCPChatCanvas\}\}/g,
  desktopPush:/<<<\[DESKTOP_PUSH\]>>>([\s\S]*?)<<<\[DESKTOP_PUSH_END\]>>>/g,
};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// 清理危险标签（防 XSS）
function sanitize(html){
  return html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,'')
    .replace(/on\w+\s*=\s*["'][^"']*["']/gi,'')
    .replace(/javascript\s*:/gi,'blocked:');
}

// ── Markdown 渲染 ──────────────────────────────
function md(text){
  if(!text)return '';
  var h=esc(text);
  // 代码块 → 带语言标签；HTML 完整文档 → 可预览
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    var trimmed=code.trim();
    // 检测完整 HTML 文档 — 提供"运行"预览
    if((lang==='html'||lang==='')&&/<!DOCTYPE\s+html|<html[\s>]/i.test(trimmed)){
      var id='hp_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
      return '<div class="html-preview" id="'+id+'">'+
        '<div class="html-preview-bar"><span>HTML 文档</span>'+
        '<button onclick="toggleHtmlPreview(\''+id+'\')">▶️ 运行</button></div>'+
        '<div class="code-block"><pre><code>'+trimmed+'</code></pre></div>'+
        '<iframe sandbox="allow-scripts allow-same-origin"></iframe></div>';
    }
    var header=lang?'<div class="code-header"><span>'+lang+'</span><span class="copy-btn" onclick="copyCode(this)">复制</span></div>':'';
    return '<div class="code-block">'+header+'<pre><code>'+trimmed+'</code></pre></div>';
  });
  h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" loading="lazy"/>');
  h=h.replace(/^#{3} (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^#{2} (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^#{1} (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g,'<ul>$&</ul>');
  h=h.replace(/^---$/gm,'<hr/>');
  h=h.replace(/\n\n+/g,'</p><p>');
  h=h.replace(/\n/g,'<br/>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p><\/p>/g,'');
  h=h.replace(/<p>(<(?:h[1-6]|pre|ul|ol|blockquote|hr|div))/g,'$1');
  h=h.replace(/(<\/(?:h[1-6]|pre|ul|ol|blockquote|hr|div)>)<\/p>/g,'$1');
  return h;
}

// ── 特殊内容处理 ────────────────────────────────
function processSpecial(content,role){
  if(!content)return '';
  var out=content;

  // 工具调用
  out=out.replace(RE.tool,function(_,body){
    var nameM=body.match(/tool_name:\s*「始」(.*?)「末」/);
    var name=nameM?nameM[1]:'Unknown Tool';
    return '<div class="tool-use" onclick="this.classList.toggle(\'expanded\')">'+
      '<span class="tool-label">VCP-ToolUse</span> '+
      '<span class="tool-name">'+esc(name)+'</span>'+
      '<div class="tool-body">'+esc(body.trim())+'</div></div>';
  });

  // 工具结果
  out=out.replace(RE.toolResult,function(_,body){
    var lines=body.trim().split('\n');
    var items='';
    var nameM=body.match(/tool_name[：:]\s*(.+)/);
    var statusM=body.match(/status[：:]\s*(.+)/);
    lines.forEach(function(line){
      var kv=line.match(/^([^：:]+)[：:]\s*([\s\S]*)$/);
      if(kv){
        items+='<div class="tool-result-item"><span class="tool-result-key">'+esc(kv[1].trim())+'</span>'+
          '<div class="tool-result-val">'+md(kv[2].trim())+'</div></div>';
      }
    });
    return '<div class="tool-result" onclick="this.classList.toggle(\'expanded\')">'+
      '<div class="tool-result-header">'+
        '<span class="tool-result-label">ToolResult</span>'+
        (nameM?'<span class="tool-result-name">'+esc(nameM[1].trim())+'</span>':'')+
        (statusM?'<span class="tool-result-status">'+esc(statusM[1].trim())+'</span>':'')+
        '<span class="tool-result-toggle"></span>'+
      '</div>'+
      '<div class="tool-result-body">'+items+'</div></div>';
  });

  // VCP 思维链
  out=out.replace(RE.thought,function(_,theme,body){
    var label=theme||'思维链';
    return '<div class="thought" onclick="this.classList.toggle(\'expanded\')">'+
      '<div class="thought-header"><span class="icon">🧠</span><span class="label">'+esc(label)+'</span></div>'+
      '<div class="thought-body">'+md(body.trim())+'</div></div>';
  });
  // <think> / <thinking>
  out=out.replace(RE.think,function(_,body){
    return '<div class="thought" onclick="this.classList.toggle(\'expanded\')">'+
      '<div class="thought-header"><span class="icon">🧠</span><span class="label">思维链</span></div>'+
      '<div class="thought-body">'+md(body.trim())+'</div></div>';
  });

  // 日记
  out=out.replace(RE.note,function(_,body){
    var maidM=body.match(/Maid:\s*(.+)/);
    var dateM=body.match(/Date:\s*(.+)/);
    var contentM=body.match(/Content:\s*([\s\S]*)/);
    return '<div class="diary">'+
      '<div class="diary-header"><span class="diary-title">Maid\'s Diary</span>'+
      (dateM?'<span class="diary-date">'+esc(dateM[1].trim())+'</span>':'')+'</div>'+
      (maidM?'<div class="diary-maid">'+esc(maidM[1].trim())+'</div>':'')+
      '<div>'+(contentM?md(contentM[1].trim()):'')+'</div></div>';
  });

  // 角色分界
  out=out.replace(RE.roleDiv,function(_,end,role){
    var cls=role.toLowerCase()+(end?' end':'');
    var label={'SYSTEM':'系统','ASSISTANT':'助手','USER':'用户'}[role]||role;
    return '<div class="role-div '+cls+'">'+label+(end?' 结束':' 开始')+'</div>';
  });

  // 按钮点击
  out=out.replace(RE.btnClick,function(_,text){
    return '<span class="btn-click">▶️ '+esc(text)+'</span>';
  });

  // Canvas 占位
  out=out.replace(RE.canvas,function(){
    return '<div style="padding:8px 14px;border:1px dashed var(--sep);border-radius:8px;font-size:13px;color:var(--text-secondary)">Canvas 协同中<span class="dots"><span></span><span></span><span></span></span></div>';
  });

  // 桌面推送
  out=out.replace(RE.desktopPush,function(_,body){
    return '<div style="background:var(--thought-bg);border:1px solid var(--thought-border);border-radius:10px;padding:10px 14px;margin:.5em 0;font-size:13px"><span style="opacity:.6">📤 桌面推送</span><div>'+md(body.trim())+'</div></div>';
  });

  return out;
}

function renderContent(content,role){
  if(!content)return '';
  // 先处理特殊标记
  var processed=processSpecial(content,role);
  // 检测是否包含原始 HTML
  if(/<(?:div|style|svg|canvas|iframe|table|script|html|head|body)\b/i.test(processed)){
    return '<div class="html-render">'+sanitize(processed)+'</div>';
  }
  // 检测是否已被特殊处理器转换（包含我们的组件class）
  if(/<div class="(?:tool-|thought|diary|role-div|btn-click)/.test(processed)){
    return processed;
  }
  return md(processed);
}

// ── 复制代码 ────────────────────────────────────
window.copyCode=function(btn){
  var pre=btn.closest('.code-block').querySelector('code');
  if(pre&&navigator.clipboard){
    navigator.clipboard.writeText(pre.textContent).then(function(){
      btn.textContent='已复制';setTimeout(function(){btn.textContent='复制'},1500);
    });
  }
};

// ── 滚动管理 ────────────────────────────────────
C.addEventListener('scroll',function(){
  autoScroll=(C.scrollHeight-C.clientHeight-C.scrollTop)<60;
},{passive:true});

function toBottom(smooth){
  if(!autoScroll)return;
  if(smooth)C.scrollTo({top:C.scrollHeight,behavior:'smooth'});
  else C.scrollTop=C.scrollHeight;
}
function throttleScroll(){
  if(scrollT)return;
  scrollT=setTimeout(function(){scrollT=null;toBottom(false)},80);
}

// ── 公开 API ────────────────────────────────────
window.vcpChat={
  addMessage:function(id,role,content,status){
    if(MM[id]){this.updateMessage(id,content,status);return}
    var d=document.createElement('div');
    d.className='m '+role;d.dataset.id=id;d.dataset.role=role;
    if(status==='streaming'||status==='draft')d.classList.add('streaming');
    var b=document.createElement('div');b.className='b';
    if(status==='draft'&&!content.trim())
      b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    else if(role==='system')b.textContent=content;
    else b.innerHTML=renderContent(content,role);
    d.appendChild(b);C.appendChild(d);MM[id]=d;
    toBottom(status!=='streaming');
  },
  updateMessage:function(id,content,status){
    var d=MM[id];if(!d)return;var b=d.querySelector('.b');if(!b)return;
    if(status==='streaming'||status==='draft')d.classList.add('streaming');
    else d.classList.remove('streaming');
    if(status==='draft'&&!content.trim())
      b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    else if(d.dataset.role==='system')b.textContent=content;
    else b.innerHTML=renderContent(content,d.dataset.role);
    throttleScroll();
  },
  removeMessage:function(id){var d=MM[id];if(d){d.remove();delete MM[id]}},
  clearChat:function(){C.innerHTML='';MM={};},
  loadHistory:function(json){
    var msgs=JSON.parse(json),frag=document.createDocumentFragment();
    for(var i=0;i<msgs.length;i++){
      var m=msgs[i],d=document.createElement('div');
      d.className='m '+m.role;d.dataset.id=m.id;d.dataset.role=m.role;
      var b=document.createElement('div');b.className='b';
      if(m.role==='system')b.textContent=m.content;
      else b.innerHTML=renderContent(m.content,m.role);
      d.appendChild(b);frag.appendChild(d);MM[m.id]=d;
    }
    C.appendChild(frag);autoScroll=true;C.scrollTop=C.scrollHeight;
  },
  scrollToBottom:function(){autoScroll=true;toBottom(true)},
  setTheme:function(dark){document.documentElement.style.colorScheme=dark?'dark':'light'}
};

// ── HTML 预览切换 ───────────────────────────────
window.toggleHtmlPreview=function(id){
  var container=document.getElementById(id);
  if(!container)return;
  var isActive=container.classList.contains('active');
  var btn=container.querySelector('.html-preview-bar button');
  var iframe=container.querySelector('iframe');
  var codeBlock=container.querySelector('.code-block')||container.querySelector('pre');
  if(isActive){
    container.classList.remove('active');
    iframe.srcdoc='';iframe.style.display='none';
    if(codeBlock)codeBlock.style.display='';
    btn.textContent='▶️ 运行';
  } else {
    // 源码来源：<code> 元素的 textContent，或 dataset.src（从 html-render 提取的）
    var code=container.querySelector('code');
    var src=code?code.textContent:(container.dataset.src||'');
    if(src){
      iframe.srcdoc=src;
      iframe.style.display='block';
      if(codeBlock)codeBlock.style.display='none';
      iframe.onload=function(){
        try{
          var h=iframe.contentDocument.documentElement.scrollHeight;
          iframe.style.height=Math.min(Math.max(h,200),window.innerHeight*0.7)+'px';
        }catch(e){iframe.style.height='400px'}
      };
    }
    container.classList.add('active');
    btn.textContent='🔙 代码';
  }
};

// ── AI 按钮交互（window.input 函数）─────────────
// AI 生成的 HTML 里的 <button> 可以调用 input('消息') 来发送消息
// 对应 VCPChat 桌面端的 contentProcessor.js processInteractiveButtons
window.input=function(text){
  if(!text)return;
  var msg='[[点击按钮:'+text+']]';
  if(window.VcpChatBridge&&window.VcpChatBridge.onAction){
    window.VcpChatBridge.onAction('send',msg);
  }
};

// 自动给 AI 生成的按钮绑定点击事件
function processButtons(container){
  var btns=container.querySelectorAll('button:not([data-vcp-processed])');
  btns.forEach(function(btn){
    btn.setAttribute('data-vcp-processed','1');
    btn.style.cursor='pointer';
    btn.addEventListener('click',function(e){
      e.preventDefault();e.stopPropagation();
      var sendText=btn.getAttribute('data-send')||btn.textContent.trim();
      if(!sendText)return;
      // 发送
      window.input(sendText);
      // 禁用按钮
      btn.disabled=true;btn.style.opacity='0.5';
      btn.textContent='✓ '+btn.textContent;
    });
  });
}

// 后处理：扫描 DOM 中的完整 HTML 文档并添加预览按钮
function processHtmlPreviews(container){
  // 扫描所有可能包含完整 HTML 文档的元素：
  // <code>、<pre>、以及 monospace 字体的 <div>（AI 经常用 inline style 输出代码）
  var candidates=container.querySelectorAll('code:not([data-hp]),pre:not([data-hp])');
  candidates.forEach(function(el){checkAndWrapPreview(el)});

  // 也扫描 html-render 里的文本内容（AI 用 <div style="monospace"> 包裹代码的情况）
  var renders=container.querySelectorAll('.html-render:not([data-hp])');
  renders.forEach(function(el){
    el.setAttribute('data-hp','1');
    var text=el.textContent||'';
    if(!/<!DOCTYPE\s+html|<html[\s>]/i.test(text))return;
    if(text.length<100)return;
    // 提取 HTML 源码（可能被 &lt; &gt; 转义显示）
    wrapAsPreview(el,text);
  });
}

function checkAndWrapPreview(el){
  el.setAttribute('data-hp','1');
  var text=el.textContent||'';
  if(!/<!DOCTYPE\s+html|<html[\s>]/i.test(text))return;
  if(text.length<100)return;
  var wrapper=el.closest('.code-block')||el.closest('pre')||el;
  if(wrapper.querySelector('.html-preview-bar'))return;
  wrapAsPreview(wrapper,text);
}

function wrapAsPreview(wrapper,htmlSource){
  var id='hp_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
  var preview=document.createElement('div');
  preview.className='html-preview';
  preview.id=id;
  // 检测 HTML 完整性
  var isComplete=/<\/html\s*>/i.test(htmlSource);
  preview.dataset.src=htmlSource;
  preview.dataset.complete=isComplete?'1':'0';
  var bar=document.createElement('div');
  bar.className='html-preview-bar';
  var label=isComplete?'HTML 文档':'HTML 文档 <span style="color:var(--orange);font-size:11px">（不完整）</span>';
  bar.innerHTML='<span>'+label+'</span><button onclick="toggleHtmlPreview(\''+id+'\')">'+(isComplete?'▶️ 运行':'⚠️ 尝试运行')+'</button>';
  var iframe=document.createElement('iframe');
  iframe.sandbox='allow-scripts allow-same-origin';
  iframe.style.display='none';
  wrapper.parentNode.insertBefore(preview,wrapper);
  preview.appendChild(bar);
  preview.appendChild(wrapper);
  preview.appendChild(iframe);
}

// 每次消息渲染后处理按钮 + HTML 预览
var _origAdd=window.vcpChat.addMessage;
window.vcpChat.addMessage=function(id,role,content,status){
  _origAdd.call(this,id,role,content,status);
  var el=MM[id];if(el){processButtons(el);processHtmlPreviews(el)}
};
var _origUpdate=window.vcpChat.updateMessage;
window.vcpChat.updateMessage=function(id,content,status){
  _origUpdate.call(this,id,content,status);
  var el=MM[id];if(el){processButtons(el);processHtmlPreviews(el)}
};
var _origHistory=window.vcpChat.loadHistory;
window.vcpChat.loadHistory=function(json){
  _origHistory.call(this,json);
  processButtons(C);processHtmlPreviews(C);
};

// ── 消息编辑功能 ─────────────────────────────────
var editOverlay=null;
window.editMessage=function(msgId){
  if(editOverlay){editOverlay.remove();editOverlay=null;}
  // 请求 Kotlin 获取原始内容
  if(window.VcpChatBridge&&window.VcpChatBridge.onAction){
    window.VcpChatBridge.onAction('getContent',msgId);
  }
};
// Kotlin 调用此函数打开编辑器
window.vcpChat.openEditor=function(msgId,rawContent){
  if(editOverlay){editOverlay.remove();}
  editOverlay=document.createElement('div');
  editOverlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;padding:12px;padding-top:calc(env(safe-area-inset-top,0px) + 12px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 12px);';
  editOverlay.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'+
      '<span style="font-size:15px;font-weight:600;">编辑消息</span>'+
      '<button onclick="cancelEdit()" style="background:none;border:none;color:var(--text);font-size:20px;padding:8px;cursor:pointer;">✕</button>'+
    '</div>'+
    '<textarea id="editArea" style="flex:1;background:var(--ast-bubble);color:var(--text);border:1px solid var(--sep);border-radius:10px;padding:12px;font-size:14px;line-height:1.5;resize:none;font-family:inherit;"></textarea>'+
    '<div style="display:flex;gap:8px;margin-top:8px;">'+
      '<button onclick="cancelEdit()" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--sep);background:none;color:var(--text);font-size:14px;cursor:pointer;">取消</button>'+
      '<button onclick="saveEdit(\''+msgId+'\')" style="flex:1;padding:10px;border-radius:10px;border:none;background:var(--user-bubble);color:#fff;font-size:14px;font-weight:600;cursor:pointer;">保存</button>'+
    '</div>';
  document.body.appendChild(editOverlay);
  var ta=document.getElementById('editArea');
  ta.value=rawContent;
  ta.focus();
};
window.cancelEdit=function(){
  if(editOverlay){editOverlay.remove();editOverlay=null;}
};
window.saveEdit=function(msgId){
  var ta=document.getElementById('editArea');
  if(!ta)return;
  var newContent=ta.value;
  // Base64 编码内容避免分隔符冲突
  var b64=btoa(unescape(encodeURIComponent(newContent)));
  if(window.VcpChatBridge&&window.VcpChatBridge.onAction){
    window.VcpChatBridge.onAction('saveEdit',msgId+'|||'+b64);
  }
  cancelEdit();
  vcpChat.updateMessage(msgId,newContent,'complete');
};

// ── 长按上下文菜单 ──────────────────────────────
var ctxMenu=document.getElementById('ctxMenu');
var ctxOverlay=document.getElementById('ctxOverlay');
var longPressTimer=null;
var longPressTarget=null;

function closeCtx(){
  ctxMenu.classList.remove('active');
  ctxOverlay.classList.remove('active');
  longPressTarget=null;
}
ctxOverlay.addEventListener('click',closeCtx);
ctxOverlay.addEventListener('touchstart',closeCtx);

// 找到消息气泡
function findMsgBubble(el){
  while(el&&el!==C){
    if(el.classList&&el.classList.contains('m'))return el;
    el=el.parentElement;
  }
  return null;
}

// 长按检测
C.addEventListener('touchstart',function(e){
  var target=e.target;
  // 忽略图片（图片有自己的点击查看器）
  if(target.tagName==='IMG')return;
  var msgEl=findMsgBubble(target);
  if(!msgEl)return;
  longPressTimer=setTimeout(function(){
    longPressTimer=null;
    showCtxMenu(msgEl,e.touches[0]);
  },500);
},{passive:true});

C.addEventListener('touchend',function(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
},{passive:true});
C.addEventListener('touchmove',function(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
},{passive:true});

function showCtxMenu(msgEl,touch){
  var id=msgEl.dataset.id;
  var role=msgEl.dataset.role;
  var isStreaming=msgEl.classList.contains('streaming');

  ctxMenu.innerHTML='';

  function addItem(icon,label,cls,fn){
    var d=document.createElement('div');
    d.className='ctx-item'+(cls?' '+cls:'');
    d.innerHTML='<span class="ctx-icon">'+icon+'</span>'+label;
    d.onclick=function(){closeCtx();fn()};
    ctxMenu.appendChild(d);
  }
  function addSep(){
    var d=document.createElement('div');d.className='ctx-sep';
    ctxMenu.appendChild(d);
  }

  // 流式中：显示中止
  if(isStreaming){
    addItem('⏹','中止回复','danger',function(){
      if(window.VcpChatBridge)window.VcpChatBridge.onAction('interrupt',id);
    });
    addSep();
  }

  // 有内容时：复制
  var bubble=msgEl.querySelector('.b');
  var hasContent=bubble&&bubble.innerText.trim().length>0;
  if(hasContent){
    addItem('📋','复制文本','',function(){
      var text=bubble.innerText.replace(/\n{3,}/g,'\n\n').trim();
      if(navigator.clipboard)navigator.clipboard.writeText(text);
      else if(window.VcpChatBridge)window.VcpChatBridge.onAction('copy',text);
    });
    addItem('📄','复制原文','',function(){
      if(window.VcpChatBridge)window.VcpChatBridge.onAction('copyRaw',id);
    });
    addSep();
  }

  // AI 专属操作
  if(role==='assistant'&&!isStreaming){
    addItem('🔄','重新回复','',function(){
      if(window.VcpChatBridge)window.VcpChatBridge.onAction('retry',id);
    });
    addItem('✏️','编辑消息','',function(){
      editMessage(id);
    });
    addItem('🔀','创建分支','',function(){
      if(window.VcpChatBridge)window.VcpChatBridge.onAction('branch',id);
    });
    addSep();
  }

  // 所有消息都可以删除（包括用户消息、空白消息、中断的消息）
  addItem('🗑️','删除消息','danger',function(){
    if(confirm('确定要删除这条消息吗？')){
      if(window.VcpChatBridge)window.VcpChatBridge.onAction('delete',id);
    }
  });

  // 定位菜单（适配刘海/安全区域）
  var x=touch.clientX,y=touch.clientY;
  var safeTop=parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)'))||0;
  var safeLeft=parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-left)'))||0;
  ctxMenu.style.left='0';ctxMenu.style.top='0';
  ctxMenu.classList.add('active');
  ctxOverlay.classList.add('active');
  var mw=ctxMenu.offsetWidth,mh=ctxMenu.offsetHeight;
  var vw=window.innerWidth,vh=window.innerHeight;
  if(x+mw>vw)x=vw-mw-8;
  if(y+mh>vh)y=vh-mh-8;
  if(x<safeLeft+8)x=safeLeft+8;
  if(y<safeTop+8)y=safeTop+8;
  ctxMenu.style.left=x+'px';ctxMenu.style.top=y+'px';
}

// ── 图片查看器 ──────────────────────────────────
var viewer=document.getElementById('imgViewer');
var viewerImg=document.getElementById('imgViewerImg');
var currentImgUrl='';

// 点击气泡内的图片 → 打开查看器
C.addEventListener('click',function(e){
  var img=e.target.closest('img');
  if(!img)return;
  // 忽略表情等小图
  if(img.naturalWidth>0&&img.naturalWidth<60)return;
  e.preventDefault();e.stopPropagation();
  currentImgUrl=img.src||img.getAttribute('data-src')||'';
  viewerImg.src=currentImgUrl;
  viewer.classList.add('active');
},true);

// 点击背景关闭
viewer.addEventListener('click',function(e){
  if(e.target===viewer)closeImgViewer();
});

window.closeImgViewer=function(){
  viewer.classList.remove('active');
  viewerImg.src='';currentImgUrl='';
};

window.saveImage=function(){
  if(!currentImgUrl)return;
  // 通知 Kotlin 侧保存图片
  if(window.VcpChatBridge&&window.VcpChatBridge.saveImage){
    window.VcpChatBridge.saveImage(currentImgUrl);
  } else {
    // 回退：用 <a download> 触发浏览器下载
    var a=document.createElement('a');
    a.href=currentImgUrl;
    a.download='image_'+Date.now()+'.png';
    a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  closeImgViewer();
};

window.copyImageUrl=function(){
  if(!currentImgUrl)return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(currentImgUrl);
  }
  closeImgViewer();
};

// ── Base64 UTF-8 解码（atob 只支持 Latin1，这里处理中文等多字节字符）
window.b64d=function(b64){
  try{
    var bin=atob(b64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }catch(e){return atob(b64)}
};

if(window.VcpChatBridge&&window.VcpChatBridge.onReady)window.VcpChatBridge.onReady();
})();
